ext {
    minSdkVersion = 24
    compileSdkVersion = 36
    targetSdkVersion = 36
    androidxActivityVersion = '1.11.0'
    androidxAppCompatVersion = '1.7.1'
    androidxCoordinatorLayoutVersion = '1.3.0'
    androidxCoreVersion = '1.17.0'
    androidxFragmentVersion = '1.8.9'
    coreSplashScreenVersion = '1.2.0'
    androidxWebkitVersion = '1.14.0'
    junitVersion = '4.13.2'
    androidxJunitVersion = '1.3.0'
    androidxEspressoCoreVersion = '3.7.0'
    cordovaAndroidVersion = '14.0.1'
    // Kotlin version MUST match what Capacitor 8.x plugins expect (2.2.20).
    // Every @capacitor/* plugin's android/build.gradle defaults to '2.2.20';
    // pinning a lower version here forces the older Kotlin compiler on plugin
    // sources that use Kotlin 2.x stdlib APIs (e.g. GeolocationErrors.kt →
    // `Unresolved reference: padStart`). Keep in sync with the classpath in
    // android/build.gradle and with scripts/validate-android.mjs.
    kotlin_version = '2.2.20'
    playServicesLocationVersion = '21.3.0'
}
